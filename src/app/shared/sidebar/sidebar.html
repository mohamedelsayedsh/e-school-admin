<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo-box"></div>
    <h2 class="logo-text">E SCHOOL</h2>
  </div>

  <ul class="nav-links">
    @for (item of navItems; track item.route) {
      <li>
        <a [routerLink]="item.route" routerLinkActive="active">
          <i [class]="item.icon" class="icon-style"></i>
          {{ item.label }}
        </a>
      </li>
    }
  </ul>
</aside>
