<div class="page-header" [class.dashboard-mode]="isDashboard()">

  @if (isDashboard()) {
    <div class="header-titles">
      <h1>Welcome back, {{ userName() }} <span class="wave">👋</span></h1>
      <p class="subtitle">Here's what's happening in Bright Path today.</p>
    </div>
  } @else {
    <h1>{{ pageTitle() }}</h1>
  }

  <div class="top-icons">

    @if (isDashboard()) {
      <div class="header-date">
        <i class="bi bi-calendar3"></i>
        <span>{{ currentDate | date:'EEEE, MMMM d, y' }}</span>
      </div>

    }

    <img
      src="https://ui-avatars.com/api/?name={{ userName() }}&background=2563eb&color=fff"
      class="profile-pic cursor-pointer"
      alt="{{ userName() }}"
      title="Go to Dashboard"
      (click)="goToDashboard()"
    />

    <div
      class="icon-circle logout-btn"
      title="Logout"
      (click)="onLogout()"
    >
      <i class="bi bi-box-arrow-right"></i>
    </div>

  </div>
</div>
