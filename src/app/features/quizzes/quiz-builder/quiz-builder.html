<div class="modal-overlay">
  <div class="modal-card modal-lg">

    <div class="modal-header">
      <h3>Add Questions to Quiz #{{ quizId() }}</h3>
      <button class="btn-close-icon" (click)="closeModal.emit()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-body" style="max-height: 80vh; overflow-y: auto;">
      @if (successMessage()) { <div class="alert alert-success">{{ successMessage() }}</div> }
      @if (errorMessage()) { <div class="alert alert-danger">{{ errorMessage() }}</div> }

      <form [formGroup]="questionForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Question Text</label>
          <textarea formControlName="text" class="form-control" rows="2"></textarea>
        </div>

        <div class="row mt-3">
          <div class="col">
            <label>Feature Key</label>
            <input type="text" formControlName="featureKey" class="form-control">
          </div>
          <div class="col">
            <label>Order</label>
            <input type="number" formControlName="order" class="form-control">
          </div>
        </div>

        <div class="options-section mt-4">
          <div class="options-header">
            <h4>Options</h4>
            <button type="button" class="btn-add-option" (click)="addOption()">+ Add Option</button>
          </div>

          <div formArrayName="options">
            @for (option of options.controls; track option; let i = $index) {
              <div [formGroupName]="i" class="option-row mt-2">
                <span>#{{ i + 1 }}</span>
                <input type="text" formControlName="text" class="form-control" placeholder="Option text (e.g. Always)">
                <button type="button" class="btn-delete-option" (click)="removeOption(i)"><i class="bi bi-trash"></i></button>
              </div>
            }
          </div>
        </div>

        <div class="modal-footer mt-4">
          <button type="button" class="btn-cancel" (click)="closeModal.emit()">Done & Close</button>
          <button type="submit" class="btn-primary" [disabled]="isLoading()">
            {{ isLoading() ? 'Saving...' : 'Save & Add Next Question' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
