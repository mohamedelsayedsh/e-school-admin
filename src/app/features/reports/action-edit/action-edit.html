<div class="modal-overlay">
  <div class="modal-card">

    <div class="modal-header">
      <h3>Edit Report Actions</h3>
      <button class="btn-close-icon" (click)="closeModal.emit()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <form [formGroup]="actionForm" (ngSubmit)="onSubmit()">
      <div class="modal-body">

        @if (errorMessage()) {
          <div class="alert alert-error">{{ errorMessage() }}</div>
        }

        <div class="form-group">
          <label>Risk Level</label>
          <select class="form-control" formControlName="riskLevel">
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
        </div>

        <div class="form-group mt-3">
          <label>Report Status</label>
          <select class="form-control" formControlName="status">
            <option value="Pending">Pending</option>
            <option value="Approved">Approved</option>
          </select>
        </div>

        <div class="form-group mt-3">
          <label>AI Recommendation (Editable)</label>
          <textarea
            class="form-control"
            rows="5"
            formControlName="recomendation"
            placeholder="Type administrative recommendations here...">
          </textarea>
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn-cancel" (click)="closeModal.emit()">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="actionForm.invalid || isSubmitting()">
          @if (isSubmitting()) {
            <span class="spinner-sm"></span> Saving...
          } @else {
            Save Changes
          }
        </button>
      </div>
    </form>

  </div>
</div>
